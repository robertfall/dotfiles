set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"
set -g extended-keys on
set-window-option -g mode-keys vi

# Mouse: tmux owns the wheel so scroll auto-enters copy mode (full scrollback).
# Inner TUIs that grab mouse-tracking (e.g. Claude Code) override this unless
# they're told to release it — see CLAUDE_CODE_DISABLE_MOUSE in .zshrc.
set -g mouse on

# OSC 52 clipboard passthrough
set -g set-clipboard on
set -g allow-passthrough on

# Status bar position
set-option -g status-position top

# Center the window list in the status bar
set-option -g status-justify absolute-centre

# Transparent bar: no session name, no clock — just the centered window list
set-option -g status-style 'bg=default,fg=default'
set-option -g status-left ''
set-option -g status-right ''

# Second status row as an empty spacer between the tab row and pane content
set-option -g status 2
set-option -g status-format[1] ''

# Window flags: current window gets dark background, needs-attention gets <+>
set-option -g window-status-format '  #{?#{||:#{window_bell_flag},#{window_activity_flag}},<+>#[underscore],}#W#[nounderscore]  '
set-option -g window-status-current-format '  #W  '
set-option -g window-status-separator '  '
set-option -g window-status-style 'bg=#3b4252,fg=#d8dee9'
set-option -g window-status-current-style 'bg=#a3be8c,fg=#2e3440'
set-option -g window-status-bell-style none
set-option -g window-status-activity-style none

# Open new panes/windows in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind 'c' new-window -c "#{pane_current_path}"

# Equalize pane sizes
bind '=' select-layout -E

# Use vi mode in selection mode
set-window-option -g mode-keys vi

# Jump between prompts in copy-mode (uses OSC 133 marks emitted by zsh precmd)
bind -T copy-mode-vi [ send-keys -X previous-prompt
bind -T copy-mode-vi ] send-keys -X next-prompt

# Copy previous command + its entire output
bind y {
  copy-mode
  send -X previous-prompt
  send -X begin-selection
  send -X next-prompt
  send -X cursor-up
  send -X end-of-line
  send -X copy-selection-and-cancel
}

# Literal (non-regex) search in copy-mode
bind -T copy-mode-vi / command-prompt -T search -p '(search down)' { send -X search-forward-text '%%' }
bind -T copy-mode-vi ? command-prompt -T search -p '(search up)'   { send -X search-backward-text '%%' }

# Seamless pane navigation with vim splits (christoomey/vim-tmux-navigator).
# Ctrl+h/j/k/l moves between panes; forwards into vim if vim is the foreground
# process, otherwise tmux switches panes. No prefix needed.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Restore clear-screen (C-l is now stolen for pane navigation)
bind C-l send-keys 'C-l'
