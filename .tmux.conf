set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"
# Refresh graphical-session variables when attaching to an existing tmux
# session from Hyprland, so new panes can connect through hyprctl. Linux-only:
# these vars are meaningless on macOS, so keep them out of its tmux config.
if-shell '[ "$(uname -s)" = Linux ]' \
  'set-option -ga update-environment " HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE"'
# Extended (CSI-u) keys, so modified keys like Shift+Enter reach the app instead
# of collapsing to a plain CR. `extended-keys on` lets tmux parse/forward them,
# but tmux only *requests* them from its parent (and advertises them to a child)
# when the terminal is known to support the `extkeys` feature. Without the
# feature flag the request doesn't propagate, so in a nested tmux Shift+Enter
# gets downgraded to CR one hop up and Claude Code sees "submit". Advertising
# extkeys for every terminal (the `*` covers both the real terminal and the
# tmux-256color a nested tmux runs under) makes the request chain all the way
# through, so Shift+Enter survives both layers. Verified with a two-level test.
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features '*:extkeys'
set-window-option -g mode-keys vi

# Mouse: tmux owns the wheel so scroll auto-enters copy mode (full scrollback).
# Inner TUIs that grab mouse-tracking (e.g. Claude Code) override this unless
# they're told to release it — see CLAUDE_CODE_DISABLE_MOUSE in .zshrc.
set -g mouse on

# OSC 52 clipboard passthrough
set -g set-clipboard on
set -g allow-passthrough on

# Session lifecycle: reap a session when its terminal closes, but preserve it
# on a deliberate detach. tmux can't tell the two apart (both look unattached),
# so we arm the reaper on attach and disarm it only when *you* detach
# (a closed window never runs the detach binding, so it still gets reaped).
set-hook -g client-attached 'set-option destroy-unattached on'
bind d set-option destroy-unattached off \; detach-client

# Status bar position
set-option -g status-position top

# Center the window list in the status bar
set-option -g status-justify absolute-centre

# Transparent bar: no session name, no clock — just the centered window list
set-option -g status-style 'bg=default,fg=default'
set-option -g status-left ''
set-option -g status-right ''

# Second status row as an empty spacer between the tab row and pane content
set-option -g status 2
set-option -g status-format[1] ''

# Window flags: current window gets dark background, needs-attention gets <+>.
# Each tab is capped with Nerd Font half-circle glyphs (U+E0B6/U+E0B4, from
# FiraCode Nerd Font's Powerline Extra set) colored to match the tab's own
# background against the transparent bar background, faking rounded corners
# on an otherwise flat rectangle. window-status-style/-current-style are kept
# literally 'default' (rather than baking the block colors in there) because
# tmux's built-in status-format[0] applies them *then* runs #[push-default]
# before handing off to our format strings below -- push-default freezes
# whatever style is active at that point as the new meaning of "default" for
# everything nested inside. If those options carried the block's own color,
# our caps' "#[bg=default]" would resolve to that same color instead of the
# true transparent bar background, making fg and bg identical -- a solid
# rectangle with an invisible curve. Every color the tabs show comes from the
# explicit #[fg=...,bg=...] escapes inside the two format strings themselves.
set-option -g window-status-format '#[fg=#3b4252,bg=default]#[fg=#d8dee9,bg=#3b4252]  #{?#{||:#{window_bell_flag},#{window_activity_flag}},<+>#[underscore],}#W#[nounderscore]  #[fg=#3b4252,bg=default]'
set-option -g window-status-current-format '#[fg=#{@tab_accent},bg=default]#[fg=#{@tab_fg},bg=#{@tab_accent}]  #W  #[fg=#{@tab_accent},bg=default]'
set-option -g window-status-separator '  '
set-option -g window-status-style 'default'
set-option -g window-status-current-style 'default'
# Active-block colors are overridden per-host at the bottom of this file; these are the fallback.
set-option -g @tab_accent '#a3be8c'
set-option -g @tab_fg '#2e3440'
set-option -g window-status-bell-style none
set-option -g window-status-activity-style none

# Pane borders: show each pane's stable id, right-aligned on its border, on
# every window. The % sigil is stripped, the number shown bold white, and it's
# wrapped in :: :: (a FiraCode ligature) that keep the border color. The style
# boundaries sit *between* the dots and the number, so each :: pair stays
# contiguous and still fuses. Purely cosmetic — the real target you hand tools
# is still %N, e.g. `tmux send-keys -t %5 ...`. The id is unique for the pane's
# whole life and survives window/pane renumbering.
set-option -g pane-border-status top
set-option -g pane-border-format '#[align=right]::#[fg=white,bold]#{s/%//:pane_id}#[default]:: '
# Active border takes the per-host color (set at the bottom of this file); this
# is the fallback until that runs. Inactive borders stay dim as an active cue.
set-option -g pane-active-border-style 'fg=#a3be8c'
set-option -g pane-border-style 'fg=#3b4252'

# Open new panes/windows in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind 'c' new-window -c "#{pane_current_path}"

# Equalize pane sizes
bind '=' select-layout -E

# Use vi mode in selection mode
set-window-option -g mode-keys vi

# Jump between prompts in copy-mode (uses OSC 133 marks emitted by zsh precmd)
bind -T copy-mode-vi [ send-keys -X previous-prompt
bind -T copy-mode-vi ] send-keys -X next-prompt

# Copy previous command + its entire output
bind y {
  copy-mode
  send -X previous-prompt
  send -X begin-selection
  send -X next-prompt
  send -X cursor-up
  send -X end-of-line
  send -X copy-selection-and-cancel
}

# Literal (non-regex) search in copy-mode
bind -T copy-mode-vi / command-prompt -T search -p '(search down)' { send -X search-forward-text '%%' }
bind -T copy-mode-vi ? command-prompt -T search -p '(search up)'   { send -X search-backward-text '%%' }

# Seamless pane navigation with vim splits (christoomey/vim-tmux-navigator).
# Ctrl+h/j/k/l moves between panes; forwards into vim if vim is the foreground
# process, otherwise tmux switches panes. No prefix needed.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Restore clear-screen (C-l is now stolen for pane navigation)
bind C-l send-keys 'C-l'

# Per-host color for the active tab block and the focused pane's border. An
# explicit pin in the case wins; any other host falls back to a deterministic
# pick from the palette (CRC of the hostname, mod palette size). Colors the
# floating current-window indicator and active pane border — not the whole bar
# — so the transparent floating-block design stays.
run-shell ' \
  HOST="$(hostname -s)"; \
  case "$HOST" in \
    hydra) C=colour63 ;; \
    *) \
      COLORS="colour24 colour30 colour52 colour96 colour130 colour136 colour166 colour172 colour29 colour63"; \
      set -- $COLORS; \
      IDX=$(( $(printf "%s" "$HOST" | cksum | awk "{print \$1}") % $# + 1 )); \
      eval "C=\${$IDX}" ;; \
  esac; \
  tmux set -g @tab_accent "$C"; \
  tmux set -g @tab_fg white; \
  tmux set -g pane-active-border-style "fg=$C"'
