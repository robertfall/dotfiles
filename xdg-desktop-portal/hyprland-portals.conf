# ~/.config/xdg-desktop-portal/hyprland-portals.conf — managed in dotfiles
# (xdg-desktop-portal/). The filename is matched against
# XDG_CURRENT_DESKTOP=Hyprland (lowercased) by xdg-desktop-portal itself.
#
# No GNOME Shell runs in this session, so org.freedesktop.impl.portal.Settings
# (color-scheme, accent-color, etc.) is routed to xdg-desktop-portal-gtk,
# which reads GSettings/dconf directly and needs no shell to back it.
# xdg-desktop-portal-gnome is deliberately not used anywhere here — it only
# works by proxying to gnome-shell, which doesn't exist under Hyprland.
#
# Hyprland-specific interfaces (Screenshot, ScreenCast, GlobalShortcuts) go
# to xdg-desktop-portal-hyprland, which speaks Hyprland's own Wayland
# protocol extensions for them.
[preferred]
default=hyprland;gtk
org.freedesktop.impl.portal.Settings=gtk
