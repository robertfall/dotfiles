# ~/.config/fuzzel/fuzzel.ini
#
# No config existed here before -- fuzzel was running on its built-in
# Solarized Light theme, which clashed with the Catppuccin Mocha used
# everywhere else (mako, waybar, hyprlock). This brings it in line and adds
# some breathing room the defaults are stingy with (vertical-pad=8,
# inner-pad=0 out of the box).

# Same family waybar's middle module (clock/forex) uses -- fontconfig
# substitutes Liberation Sans for it on this machine (Arimo itself isn't
# installed), same as it does for waybar.
font=Arimo:size=15
vertical-pad=20
inner-pad=14
# Per-entry breathing room in the match list -- fuzzel has no dedicated
# item-padding option, and no separate icon-size option either: icons are
# always scaled to fill line-height (default ~24px at this font size), so
# some icon growth comes with any row-padding increase. Keeping this bump
# modest (vs. the 70 we tried, which made icons comically large) is the
# balance point.
line-height=32

[colors]
# Catppuccin Mocha, same values used in mako/config and waybar/style.css.
background=1e1e2eff       # Base
text=cdd6f4ff              # Text
input=cdd6f4ff              # Text
placeholder=6c7086ff       # Overlay0
match=89b4faff              # Blue
selection=313244ff         # Surface0
selection-text=cdd6f4ff     # Text
selection-match=b4befeff    # Lavender -- reads better than Blue against the Surface0 highlight
border=89b4faff             # Blue -- same accent as mako's border-color
prompt=89b4faff              # Blue

[border]
width=2
radius=12
# Default is 0, which draws the selected row as a hard-cornered rectangle
# inside fuzzel's own rounded (radius=12) window. Rounding it too avoids
# that mismatch.
selection-radius=8
