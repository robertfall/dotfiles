# ~/.config/hypr/hyprlock.conf
background {
    monitor =
    color = rgba(30, 30, 46, 1.0)
    blur_passes = 2
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_center = true
    outer_color = rgba(89b4faee)
    inner_color = rgba(1e1e2eff)
    font_color = rgba(cdd6f4ff)
    placeholder_text = <i>Password…</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 48
    font_family = sans-serif
    color = rgba(cdd6f4ff)
    position = 0, 80
    halign = center
    valign = center
}
