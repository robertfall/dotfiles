# ~/.config/hypr/hyprlock.conf
background {
    monitor =
    path = /home/robertherbst/Pictures/wall.jpg
    color = rgba(30, 30, 46, 1.0)   # fallback if the image fails to load
    blur_passes = 0
}

# Opaque card behind the date/clock/rates group, instead of blurring the
# wallpaper. Sized and padded to contain all three lines below with roughly
# even margins (font_size-based estimate -- nudge if it looks off in person).
shape {
    monitor =
    size = 340, 160
    color = rgba(30, 30, 46, 0.8)
    rounding = 16
    position = 0, 0
    halign = center
    valign = center
}

# Date, clock and rates are one visual group, centered as a unit on the true
# center of the screen (position offsets below are relative to that group's
# own center, not to the password box).
label {
    monitor =
    text = cmd[update:60000] date '+%A, %-d %B'
    font_size = 16
    font_family = sans-serif
    color = rgba(cdd6f4ff)
    position = 0, 46
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 36
    font_family = sans-serif
    color = rgba(cdd6f4ff)
    position = 0, 0
    halign = center
    valign = center
}

# Both rates on one line -- see lockscreen-rates.sh (wraps the same
# waybar-facing usd-zar.sh/eur-zar.sh scripts, just combined + separated by a
# middot instead of two separate labels).
label {
    monitor =
    text = cmd[update:900000] bash ~/.config/hypr/scripts/lockscreen-rates.sh
    font_size = 15
    font_family = sans-serif
    color = rgba(cdd6f4ff)
    position = 0, -45
    halign = center
    valign = center
}

# Moved further down, below the now-centered date/clock/rates card, so the
# two groups don't overlap -- previously sat right where the card now lives.
# (Negative y here is further down the screen, not up -- confirmed by testing
# live rather than assumed.)
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_center = true
    outer_color = rgba(89b4faee)
    inner_color = rgba(1e1e2eff)
    font_color = rgba(cdd6f4ff)
    placeholder_text = <i>Password…</i>
    position = 0, -135
    halign = center
    valign = center
}
