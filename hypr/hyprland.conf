# ~/.config/hypr/hyprland.conf  — managed in dotfiles (hypr/)
# Idiomatic Hyprland keybinds. Docs: https://wiki.hypr.land/Configuring/

################
### MONITORS ###
################
# Match the desktop layout used on this machine:
# - Dell U2718Q on the left at 150% (logical size 2560x1440)
# - LG TV on the right at 125% (logical size 3072x1728), bottom-aligned
monitor = DP-1,3840x2160@60,0x288,1.5
monitor = HDMI-A-1,3840x2160@119.88,2560x0,1.25
# Fall back gracefully for any other output.
monitor = ,preferred,auto,1

###################
### ENVIRONMENT ###
###################
# NVIDIA (proprietary 595 + explicit sync already active on this box).
# No legacy WLR_* hacks: Hyprland uses aquamarine, and explicit sync is on.
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto   # Electron/Chromium apps -> native Wayland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# Identify this session correctly to apps and desktop portals.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
# Plain GTK3 apps (blueman-manager, etc.) don't speak the portal-based
# color-scheme protocol at all -- only GTK4/libadwaita and apps with their
# own portal-query code (Firefox) do. GTK3's own legacy dark-mode switch,
# gtk-application-prefer-dark-theme, isn't even in this system's gsettings
# schema, so there's no gsettings-level fix for GTK3 apps. Force it directly
# instead; confirmed live against blueman-manager.
env = GTK_THEME,Adwaita:dark
# GTK4 dropped GTK3's loadable immodules (no more im-ibus.so) and now only
# composes dead-key/compose-key sequences itself if it's told to use its
# built-in "simple" context; otherwise it tries the Wayland input-method
# protocol, finds no provider bound (ibus on this box doesn't implement
# input-method-v2, just the old X11/D-Bus IBus protocol), and silently drops
# compose sequences. fuzzel is unaffected since it isn't GTK and composes
# keys itself via libxkbcommon directly. Confirmed live against anyrun/walker.
env = GTK_IM_MODULE,simple

################
### XWAYLAND ###
################
# Both monitors run fractional scale (1.5 / 1.25). Without this, XWayland
# clients render at scale 1 and get bitmap-upscaled by Hyprland -> blurry
# text (hit Vivaldi-via-XWayland and Obsidian's Flatpak, which also runs
# --ozone-platform=x11). This makes Hyprland do the scaling instead, sharp
# but XWayland apps may not know the real scale -> may render UI small;
# compensate per-app (e.g. Chromium/Electron: --force-device-scale-factor=1.25).
xwayland {
    force_zero_scaling = true
}

#################
### AUTOSTART ###
#################
# Let portals / systemd user services inherit the Wayland session env.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
# xdg-desktop-portal.service has Requisite=graphical-session.target — it
# checks the target is already active rather than pulling it in itself.
# Hyprland has no built-in systemd session integration, so that target only
# ever activates because this session is launched through uwsm (see the
# "Hyprland (uwsm)" entry at /usr/local/share/wayland-sessions/, sourced from
# hypr/hyprland-managed.desktop in this repo) — uwsm's wayland-session@.target
# has BindsTo=graphical-session.target, which is what starts it. Don't
# hand-launch the portal here; if graphical-session.target isn't active,
# that's a sign this session didn't actually go through uwsm.
# The actual dark-mode source of truth: xdg-desktop-portal-gtk reads this
# straight out of GSettings and republishes it over org.freedesktop.appearance
# (see ~/.config/xdg-desktop-portal/hyprland-portals.conf for backend
# routing — no GNOME Shell involved). No "gtk-theme Adwaita-dark" hack here:
# that theme name doesn't exist on this system and silently did nothing.
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = waybar
exec-once = mako
exec-once = hypridle
# GUI daemon for the global (all-workspaces, recency-sorted) Super+Tab
# switcher -- see the KEYBINDINGS section below for the actual bind.
exec-once = ~/.cargo/bin/hyprswitch init --show-title --size-factor 5.5 --workspaces-per-row 5 &
exec-once = swaybg -i ~/Pictures/wall.jpg -m fill
# polkit auth agent (GUI privilege prompts). Verify path: rpm -ql mate-polkit | grep agent-1
exec-once = /usr/libexec/polkit-mate-authentication-agent-1
# Clipboard history (works because Hyprland provides data-control):
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#############
### INPUT ###
#############
input {
    kb_layout = us
    kb_options = ctrl:nocaps, compose:ralt
    # 0: cursor movement never changes focus, only clicking does. Was 1
    # (classic focus-follows-mouse, any hover steals focus).
    follow_mouse = 0
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

####################
### LOOK & FEEL ####
####################
general {
    gaps_in = 10
    gaps_out = 10
    border_size = 1
    # Matches this host's tmux active-tab accent (@tab_accent = #7fae7f, set
    # per-host at the bottom of .tmux.conf) rather than an independent color.
    col.active_border = rgba(7fae7fee)
    col.inactive_border = rgba(313244aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 0
    # Compositor-level opacity, unlike Ghostty's own background-opacity: this
    # fades the whole composited window (text and all), not just a background
    # layer, since most apps (Firefox included) don't expose a separate
    # background-alpha knob of their own. Same value for active/inactive --
    # no focus-based fade.
    active_opacity = 0.93
    inactive_opacity = 0.93
    blur {
        enabled = true
        size = 3
        passes = 2
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
    }
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 4, ease
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, ease
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

###################
### KEYBINDINGS ###
###################
$mod = SUPER
$term = ghostty
$menu = fuzzel
$fileManager = nautilus
$switchKey = tab
$switchReverseKey = grave

# Apps / launchers
bind = $mod, Return, exec, $term
bind = $mod, D, exec, $menu
bind = $mod, Slash, exec, $menu            # alias for your old Pop launcher key
bind = $mod, E, exec, $fileManager
bind = $mod, C, exec, bash ~/.config/hypr/scripts/calc.sh                          # calculator + forex
bind = $mod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy   # clipboard history
bind = $mod, A, exec, bash ~/.config/hypr/scripts/approval-window.sh               # chromeless ticketoffice dashboard
bind = $mod, N, exec, orbit toggle top-right                                       # wifi/bluetooth/vpn quick panel

# Hardware volume keys: wpctl changes volume, then Mako shows the result.
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-osd.sh raise
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-osd.sh lower
bindl = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume-osd.sh mute
bindl = , XF86AudioMicMute, exec, ~/.config/hypr/scripts/volume-osd.sh mic-mute

# Window management
bind = $mod, Q, killactive
bind = $mod SHIFT, Space, togglefloating
bind = $mod, F, fullscreen, 1              # maximize (keep bar)
bind = $mod SHIFT, F, fullscreen, 0        # true fullscreen
bind = $mod, O, layoutmsg, togglesplit     # dwindle: flip split orientation (your old Super+O)
bind = $mod, P, pseudo

# Global window switcher (hyprswitch, daemon started above via ~/.cargo/bin): hold $mod,
# tap tab repeatedly to step back through every window on every workspace
# sorted by recency, hold+grave to step forward again, release $mod to switch.
# --mod-key takes hyprswitch's own lowercase enum (super/alt/ctrl/shift), not
# Hyprland's own SUPER/ALT bind-mod spelling that $mod expands to -- hardcoded
# here rather than reusing $mod, which would pass "SUPER" and fail to parse.
bind = $mod, $switchKey, exec, ~/.cargo/bin/hyprswitch gui --mod-key super --key $switchKey --close mod-key-release --reverse-key=key=$switchReverseKey --sort-recent && ~/.cargo/bin/hyprswitch dispatch
bind = $mod $switchReverseKey, $switchKey, exec, ~/.cargo/bin/hyprswitch gui --mod-key super --key $switchKey --close mod-key-release --reverse-key=key=$switchReverseKey --sort-recent && ~/.cargo/bin/hyprswitch dispatch -r

# Focus (vim keys, like your Pop setup)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move the focused window (modeless SUPER+SHIFT+hjkl)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Resize the focused window (repeatable)
binde = $mod CTRL, h, resizeactive, -40 0
binde = $mod CTRL, l, resizeactive, 40 0
binde = $mod CTRL, k, resizeactive, 0 -40
binde = $mod CTRL, j, resizeactive, 0 40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
# Move focused window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Screenshots (grim + slurp -> clipboard)
bind = , Print, exec, grim -t png - | wl-copy --type image/png
bind = SHIFT, Print, exec, grim -g "$(slurp)" -t png - | wl-copy --type image/png
bind = $mod, S, exec, grim -t png - | wl-copy --type image/png
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" -t png - | wl-copy --type image/png

# Session
bind = $mod, Escape, exec, hyprlock        # lock
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, M, exit                 # quit Hyprland -> back to GDM (GNOME still your fallback)
bind = $mod SHIFT, T, exec, bash ~/.config/hypr/scripts/kick-monitor.sh   # TV blank after standby? force a re-modeset
bind = $mod SHIFT, O, setprop, activewindow opaque toggle   # force focused window fully opaque (e.g. video playback), toggle back off

# Mouse: move/resize floating windows
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

###################
### WINDOWRULES ###
###################
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:title ^(Open File)(.*)$, float on
# Chromium --app= mode signals "fixed-size window", which Hyprland
# auto-floats; override so it tiles like any other window.
windowrule = match:class ^(vivaldi-approval)$, float off
windowrule = match:title ^(Save File)(.*)$, float on
